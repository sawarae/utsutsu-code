# XcodeGen project specification
# Generate .xcodeproj: xcodegen generate
name: UtsutsuRemote
options:
  bundleIdPrefix: com.utsutsu-code
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: UtsutsuRemote/Info.plist

targets:
  UtsutsuRemote:
    type: application
    platform: iOS
    sources:
      - path: UtsutsuRemote
        excludes:
          - Assets.xcassets/AppIcon.appiconset/*.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.utsutsu-code.remote
        PRODUCT_NAME: UtsutsuRemote
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: UtsutsuRemote/Info.plist
    info:
      path: UtsutsuRemote/Info.plist
